<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning Wimmob</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--card:#fff;--border:#e0ddd5;--text:#1a1a1a;--muted:#777;--radius:10px;--radius-sm:6px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px 20px}
.wrap{max-width:900px;margin:0 auto}
.header{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-bottom:20px}
.title{font-size:22px;font-weight:700;flex:1}
.subtitle{font-size:13px;color:var(--muted);margin-top:2px}
.btn{font-size:13px;padding:7px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--muted);cursor:pointer;font-family:inherit}
.btn:hover{background:var(--bg)}
.btn-primary{background:#e6f1fb;color:#185fa5;border-color:#b5d4f4;font-weight:600}
.btn-primary:hover{opacity:.85}
.btn-danger{background:#faece7;color:#993c1d;border-color:#f0997b}
.sync-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-bottom:20px;padding:8px 14px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#639922;flex-shrink:0}
.sync-dot.off{background:#E24B4A}
.sync-dot.loading{background:#EF9F27}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.fb{font-size:12px;padding:3px 12px;border:1px solid var(--border);border-radius:20px;background:var(--card);color:var(--muted);cursor:pointer;font-family:inherit}
.fb.on{background:#e6f1fb;color:#185fa5;border-color:#b5d4f4}
.clients{display:flex;flex-direction:column;gap:0}
.client-block{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px}
.client-hdr{padding:10px 16px;border-bottom:1px solid var(--border);background:#fafaf8;display:flex;align-items:center;gap:8px}
.client-nom{font-size:13px;font-weight:700;flex:1}
.client-ville{font-size:11px;color:var(--muted);font-style:italic}
.tasks{display:flex;flex-direction:column}
.task-row{display:flex;align-items:flex-start;gap:10px;padding:9px 16px;border-bottom:0.5px solid var(--border)}
.task-row:last-child{border-bottom:none}
.task-row.done .task-text{text-decoration:line-through;color:var(--muted)}
.cb{width:16px;height:16px;border:1.5px solid #ccc;border-radius:4px;flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#fff}
.cb.checked{background:#639922;border-color:#639922}
.cb.checked::after{content:'';display:block;width:4px;height:8px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
.task-body{flex:1;min-width:0}
.task-text{font-size:13px;color:var(--text);line-height:1.4;cursor:pointer}
.task-meta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center}
.who{font-size:11px;padding:1px 8px;border-radius:10px;font-weight:500}
.who-G{color:#085041;background:#E1F5EE}
.who-A{color:#0C447C;background:#E6F1FB}
.who-GA{color:#633806;background:#FAEEDA}
.dl{font-size:11px;font-weight:500}
.dl-fire{color:#A32D2D}
.dl-warn{color:#854F0B}
.dl-ok{color:#3B6D11}
.dl-open{color:var(--muted);font-style:italic}
.task-actions{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 4px;color:var(--muted);border-radius:4px}
.icon-btn:hover{background:var(--bg);color:var(--text)}
.add-form{padding:10px 16px;border-top:1px solid var(--border);background:#fafaf8;display:none}
.add-form.open{display:block}
.add-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.add-form input,.add-form select{font-size:12px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 8px;background:#fff;color:var(--text);font-family:inherit;width:100%}
.add-form-btns{display:flex;gap:6px;justify-content:flex-end}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:var(--radius);padding:1.5rem;width:90%;max-width:440px}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px}
.modal-field{margin-bottom:10px}
.modal-field label{font-size:12px;color:var(--muted);display:block;margin-bottom:3px}
.modal-field input,.modal-field select{width:100%;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 9px;font-family:inherit}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.add-client-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border:1px dashed var(--border);border-radius:var(--radius);color:var(--muted);font-size:13px;cursor:pointer;background:transparent;font-family:inherit;width:100%;margin-bottom:10px}
.add-client-btn:hover{background:var(--card)}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;font-size:13px;padding:10px 18px;border-radius:8px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <div class="title">Planning Wimmob</div>
      <div class="subtitle">Séance du mardi — Gaëlle &amp; Aymeric</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" onclick="window.print()">Imprimer</button>
      <button class="btn btn-primary" id="add-client-top">+ Ajouter un client</button>
    </div>
  </div>
 
  <div class="sync-bar">
    <div class="sync-dot loading" id="sync-dot"></div>
    <span id="sync-label">Connexion à la base de données...</span>
    <span style="margin-left:auto;font-size:11px" id="last-sync"></span>
  </div>
 
  <div class="filters">
    <button class="fb on" data-f="all">Tous</button>
    <button class="fb" data-f="G">Gaëlle</button>
    <button class="fb" data-f="A">Aymeric</button>
    <button class="fb" data-f="GA">G + A</button>
    <button class="fb" data-f="todo">À faire</button>
  </div>
 
  <div class="clients" id="clients-list"></div>
  <button class="add-client-btn" id="add-client-btn">+ Nouveau client / dossier</button>
</div>
 
<div class="modal-overlay" id="modal-task">
  <div class="modal">
    <h3 id="modal-title">Nouvelle tâche</h3>
    <div class="modal-field"><label>Tâche</label><input id="mt-tache" type="text" placeholder="Description de la tâche"></div>
    <div class="modal-field"><label>Responsable</label>
      <select id="mt-resp">
        <option value="G">Gaëlle</option>
        <option value="A">Aymeric</option>
        <option value="GA">Gaëlle + Aymeric</option>
      </select>
    </div>
    <div class="modal-field"><label>Deadline</label><input id="mt-dl" type="date"></div>
    <input type="hidden" id="mt-id">
    <input type="hidden" id="mt-client">
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveTask()">Enregistrer</button>
    </div>
  </div>
</div>
 
<div class="modal-overlay" id="modal-client">
  <div class="modal">
    <h3>Nouveau client / dossier</h3>
    <div class="modal-field"><label>Nom du client</label><input id="mc-nom" type="text" placeholder="SCI CAC"></div>
    <div class="modal-field"><label>Ville</label><input id="mc-ville" type="text" placeholder="Saintes"></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeClientModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveClient()">Créer</button>
    </div>
  </div>
</div>
 
<div class="toast" id="toast"></div>
 
<script>
const SUPA_URL = 'https://kfkgadwxfiklrgtppvhk.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtma2dhZHd4ZmlrbHJndHBwdmhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDk2NDksImV4cCI6MjA5MTkyNTY0OX0.IeasKsuSJNepaZ_qkOJWMlT10hyVSU4ol33l5M6o-2s';
 
const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);
 
let allTasks = [];
let curFilter = 'all';
let editingId = null;
 
const whoLbl = {G:'Gaëlle', A:'Aymeric', GA:'G + A'};
const whoCls = {G:'who-G', A:'who-A', GA:'who-GA'};
 
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
 
function setSyncStatus(ok, msg){
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot ' + (ok === null ? 'loading' : ok ? '' : 'off');
  lbl.textContent = msg;
  if(ok) document.getElementById('last-sync').textContent = 'Dernière sync : ' + new Date().toLocaleTimeString('fr-FR');
}
 
function dlInfo(dl, fait){
  if(fait) return {cls:'dl-ok', label:'Fait'};
  if(!dl) return {cls:'dl-open', label:'pas de deadline'};
  const d = new Date(dl);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  const label = diff < 0 ? 'en retard' : diff === 0 ? "aujourd'hui" : diff === 1 ? 'demain' : d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
  const cls = diff < 0 ? 'dl-fire' : diff <= 3 ? 'dl-warn' : 'dl-ok';
  return {cls, label};
}
 
function groupByClient(tasks){
  const map = {};
  tasks.forEach(t => {
    if(!map[t.client]) map[t.client] = {ville: t.ville||'', tasks:[]};
    map[t.client].tasks.push(t);
  });
  return map;
}
 
function render(){
  const list = document.getElementById('clients-list');
  let filtered = allTasks;
  if(curFilter === 'G') filtered = allTasks.filter(t => t.responsable === 'G');
  else if(curFilter === 'A') filtered = allTasks.filter(t => t.responsable === 'A');
  else if(curFilter === 'GA') filtered = allTasks.filter(t => t.responsable === 'GA');
  else if(curFilter === 'todo') filtered = allTasks.filter(t => !t.fait);
 
  const groups = groupByClient(filtered);
  list.innerHTML = '';
 
  if(Object.keys(groups).length === 0){
    list.innerHTML = '<div class="empty">Aucune tâche — clique sur "+ Nouveau client" pour commencer</div>';
    return;
  }
 
  Object.entries(groups).forEach(([client, {ville, tasks}]) => {
    const block = document.createElement('div');
    block.className = 'client-block';
 
    block.innerHTML = `
      <div class="client-hdr">
        <span class="client-nom">${client}</span>
        ${ville ? `<span class="client-ville">${ville}</span>` : ''}
        <button class="btn" style="font-size:11px;padding:3px 10px" onclick="openTaskModal('${client.replace(/'/g,"\\'")}')">+ Tâche</button>
      </div>
      <div class="tasks" id="tasks-${encodeURIComponent(client)}"></div>`;
 
    list.appendChild(block);
 
    const tl = block.querySelector(`#tasks-${encodeURIComponent(client)}`);
    tasks.forEach(t => {
      const {cls, label} = dlInfo(t.deadline, t.fait);
      const row = document.createElement('div');
      row.className = 'task-row' + (t.fait ? ' done' : '');
      row.innerHTML = `
        <div class="cb ${t.fait ? 'checked' : ''}" onclick="toggleTask('${t.id}', ${!t.fait})"></div>
        <div class="task-body">
          <div class="task-text">${t.tache}</div>
          <div class="task-meta">
            <span class="who ${whoCls[t.responsable]}">${whoLbl[t.responsable]}</span>
            <span class="dl ${cls}">${label}</span>
          </div>
        </div>
        <div class="task-actions">
          <button class="icon-btn" title="Modifier" onclick="editTask(${JSON.stringify(t).replace(/"/g,'&quot;')})">✎</button>
          <button class="icon-btn" title="Supprimer" onclick="deleteTask('${t.id}')">✕</button>
        </div>`;
      tl.appendChild(row);
    });
  });
}
 
async function loadTasks(){
  setSyncStatus(null, 'Chargement...');
  const { data, error } = await db.from('taches').select('*').order('client').order('deadline', {nullsFirst: false});
  if(error){ setSyncStatus(false, 'Erreur de connexion'); return; }
  allTasks = data;
  setSyncStatus(true, 'Connecté — données synchronisées');
  render();
}
 
async function toggleTask(id, fait){
  await db.from('taches').update({fait}).eq('id', id);
  await loadTasks();
  toast(fait ? 'Tâche marquée comme faite' : 'Tâche réouverte');
}
 
async function deleteTask(id){
  if(!confirm('Supprimer cette tâche ?')) return;
  await db.from('taches').delete().eq('id', id);
  await loadTasks();
  toast('Tâche supprimée');
}
 
function editTask(t){
  editingId = t.id;
  document.getElementById('modal-title').textContent = 'Modifier la tâche';
  document.getElementById('mt-tache').value = t.tache;
  document.getElementById('mt-resp').value = t.responsable;
  document.getElementById('mt-dl').value = t.deadline || '';
  document.getElementById('mt-client').value = t.client;
  document.getElementById('modal-task').classList.add('open');
}
 
function openTaskModal(client){
  editingId = null;
  document.getElementById('modal-title').textContent = 'Nouvelle tâche';
  document.getElementById('mt-tache').value = '';
  document.getElementById('mt-resp').value = 'G';
  document.getElementById('mt-dl').value = '';
  document.getElementById('mt-client').value = client;
  document.getElementById('modal-task').classList.add('open');
}
 
function closeModal(){ document.getElementById('modal-task').classList.remove('open'); }
function closeClientModal(){ document.getElementById('modal-client').classList.remove('open'); }
 
async function saveTask(){
  const tache = document.getElementById('mt-tache').value.trim();
  if(!tache){ alert('La tâche ne peut pas être vide'); return; }
  const payload = {
    tache,
    responsable: document.getElementById('mt-resp').value,
    deadline: document.getElementById('mt-dl').value || null,
    client: document.getElementById('mt-client').value,
  };
  if(editingId){
    await db.from('taches').update(payload).eq('id', editingId);
    toast('Tâche modifiée');
  } else {
    const ville = allTasks.find(t => t.client === payload.client)?.ville || '';
    await db.from('taches').insert({...payload, ville, fait: false});
    toast('Tâche ajoutée');
  }
  closeModal();
  await loadTasks();
}
 
async function saveClient(){
  const nom = document.getElementById('mc-nom').value.trim();
  if(!nom){ alert('Le nom ne peut pas être vide'); return; }
  const ville = document.getElementById('mc-ville').value.trim();
  await db.from('taches').insert({client: nom, ville, tache:'(premier point à renseigner)', responsable:'G', fait:false, deadline:null});
  closeClientModal();
  await loadTasks();
  toast('Client ajouté');
}
 
document.querySelectorAll('.fb').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.fb').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  curFilter = b.dataset.f;
  render();
}));
 
document.getElementById('add-client-btn').addEventListener('click', () => {
  document.getElementById('mc-nom').value = '';
  document.getElementById('mc-ville').value = '';
  document.getElementById('modal-client').classList.add('open');
});
document.getElementById('add-client-top').addEventListener('click', () => {
  document.getElementById('mc-nom').value = '';
  document.getElementById('mc-ville').value = '';
  document.getElementById('modal-client').classList.add('open');
});
 
// Sync automatique toutes les 30 secondes
setInterval(loadTasks, 30000);
 
// Charger au démarrage
loadTasks();
</script>
</body>
</html>
